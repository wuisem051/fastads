<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --header-bg: #222d32;
            --section-bg: #f4f6f7;
            --text-main: #333333;
            --text-grey: #7f8c8d;
            --accent-blue: #00a0e9;
            --accent-green: #4cd137;
            --border-color: #e6e9ed;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: var(--text-main);
        }

        /* Header */
        header {
            background: var(--header-bg);
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .logo {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .logo span {
            color: var(--accent-green);
        }

        .version {
            position: absolute;
            top: 5px;
            right: 10px;
            color: #5d6d7e;
            font-size: 10px;
        }

        /* Section Titles */
        .section-header {
            background: var(--section-bg);
            padding: 8px 15px;
            color: var(--text-grey);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        /* User Info */
        .user-info {
            padding: 20px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #eee;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-details h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .user-details p {
            margin: 2px 0 0;
            color: var(--text-grey);
            font-size: 13px;
        }

        .balance-val {
            color: var(--text-main);
            font-weight: bold;
        }

        /* Button */
        .btn-container {
            padding: 0 15px 20px;
        }

        .primary-btn {
            width: 100%;
            background: var(--accent-blue);
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .primary-btn:hover {
            background: #0090d1;
        }

        /* Stats List */
        .stats-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .stat-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-grey);
        }

        .stat-val {
            color: #000;
            font-weight: bold;
        }

        /* Footer Toggle */
        footer {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #ffffff;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent-green);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .toggle-label {
            font-size: 13px;
            color: var(--text-grey);
            font-style: italic;
        }
    </style>
</head>

<body>
    <header>
        <span class="version">ver 1.0.0</span>
        <div class="logo">FAST<span style="color: var(--accent-green)">ADS</span> <span style="font-size: 0.9em">⚡</span></div>
    </header>

    <div class="section-header">CUENTA</div>

    <div class="user-info">
        <div class="avatar" id="avatar-container">
            <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" id="user-avatar" alt="Avatar">
        </div>
        <div class="user-details">
            <h3 id="user-name">Usuario</h3>
            <p>Balance: <span class="balance-val" id="balance">0.0000 USD</span></p>
        </div>
    </div>

    <div class="btn-container">
        <button class="primary-btn" id="go-to-dashboard">Ir a la cuenta</button>
    </div>

    <div class="section-header">ESTADÍSTICAS DE HOY</div>

    <ul class="stats-list">
        <li class="stat-item">
            <span>Ganado:</span>
            <span class="stat-val" id="today-earned">0.0000 USD</span>
        </li>
        <li class="stat-item">
            <span>Téasers vistos:</span>
            <span class="stat-val" id="teasers-viewed">0</span>
        </li>
        <li class="stat-item">
            <span>Popups vistos:</span>
            <span class="stat-val" id="popups-viewed">0</span>
        </li>
    </ul>

    <footer>
        <label class="switch">
            <input type="checkbox" id="ad-toggle" checked>
            <span class="slider"></span>
        </label>
        <span class="toggle-label" id="toggle-text">Anuncios activados</span>
    </footer>



    <script src="popup.js"></script>
</body>

</html>
